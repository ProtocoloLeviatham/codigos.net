<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.A.C.D.I. - Medidor de Áreas Pro (V5)</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --success: #10b981; --warning: #f59e0b; --text: #f8fafc; --text-muted: #94a3b8; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 400px; background-color: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; z-index: 10; box-shadow: 2px 0 10px rgba(0,0,0,0.5); }
        .sidebar-header { padding: 15px 20px; border-bottom: 1px solid #334155; background: #0b1120; }
        h2 { color: var(--accent); font-size: 1.2rem; margin: 0 0 5px 0; letter-spacing: 0.5px; }
        
        .instructions { font-size: 0.75rem; color: #cbd5e1; margin-top: 5px; line-height: 1.4; background: rgba(59, 130, 246, 0.1); padding: 8px; border-radius: 4px; border-left: 3px solid var(--accent); }
        .instructions b { color: var(--warning); }

        .controls { padding: 15px 20px; display: flex; gap: 10px; border-bottom: 1px solid #334155; }
        button, .file-upload { flex: 1; background: var(--accent); color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 6px; text-align: center; font-size: 0.85rem; transition: background 0.2s; }
        button:hover, .file-upload:hover { background: #2563eb; }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        input[type="file"] { display: none; }

        #field-list { flex: 1; overflow-y: auto; padding: 10px 20px; list-style: none; margin: 0; }
        .field-item { padding: 10px; margin-bottom: 5px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; font-size: 0.85rem; color: var(--text-muted); transition: all 0.2s; cursor: pointer; display: flex; flex-direction: column; gap: 5px;}
        .field-item.active { background: rgba(59, 130, 246, 0.2); border-color: var(--accent); color: white; border-left: 4px solid var(--accent); }
        .field-item.done { border-color: var(--success); }
        
        .field-header { display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .field-data { font-family: monospace; font-size: 0.75rem; color: var(--warning); background: #000; padding: 4px; border-radius: 3px; display: none; }
        .field-item.done .field-data { display: block; color: var(--success); border: 1px dashed var(--success);}

        .json-container { height: 180px; border-top: 1px solid #334155; display: flex; flex-direction: column; }
        .json-header { padding: 5px 20px; background: #0f172a; font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        .json-header span { cursor: pointer; color: var(--accent); font-weight: bold; }
        #json-output { flex: 1; background: #000; color: var(--success); border: none; padding: 10px 20px; font-family: 'Consolas', monospace; font-size: 0.75rem; resize: none; outline: none; }

        #workspace { flex: 1; overflow: hidden; position: relative; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; cursor: crosshair; }
        canvas { display: block; position: absolute; top: 0; left: 0; }
        
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; background: #334155; color: white;}
        .done .status-badge { background: rgba(16, 185, 129, 0.2); color: var(--success); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>I.A.C.D.I. Medidor de Áreas</h2>
            <div class="instructions">
                <b>NUEVA HERRAMIENTA DE MEDICIÓN:</b><br>
                1. 🖱️ <b>Clic y Arrastrar:</b> Dibuja un rectángulo sobre el campo para medir Ancho y Alto.<br>
                2. 🔍 <b>Rueda:</b> Zoom | ✋ <b>SHIFT + Clic:</b> Mover
            </div>
        </div>
        
        <div class="controls">
            <label class="file-upload">
                <input type="file" id="imageLoader" accept="image/*">
                📁 Cargar Plantilla
            </label>
            <button id="resetBtn" class="danger">⟲ Reiniciar</button>
        </div>

        <ul id="field-list"></ul>
        
        <div class="json-container">
            <div class="json-header">
                <b>Salida JSON (Coordenadas y Medidas)</b>
                <span id="copyBtn">📋 Copiar</span>
            </div>
            <textarea id="json-output" readonly>{}</textarea>
        </div>
    </div>

    <div id="workspace">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // Secuencia solicitada. (Puedes añadir más si lo necesitas)
        const secuenciaCampos = [
            "DOMICILIO",
            "LUGAR DE NACIMIENTO"
        ];

        const imageLoader = document.getElementById('imageLoader');
        const workspace = document.getElementById('workspace');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const jsonOutput = document.getElementById('json-output');
        const fieldList = document.getElementById('field-list');
        
        let img = new Image();
        let mappedData = {};
        let currentIndex = 0;

        // Variables de Entorno (Zoom/Pan)
        let scale = 1;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false; // Para mover la imagen (Pan)
        let isDrawingBox = false; // Para dibujar el rectángulo
        
        let dragStartX = 0, dragStartY = 0;
        let boxStartX = 0, boxStartY = 0;
        let boxCurrentX = 0, boxCurrentY = 0;
        
        let mouseX = -1, mouseY = -1;

        function resizeCanvas() {
            canvas.width = workspace.clientWidth;
            canvas.height = workspace.clientHeight;
            if(img.src) redraw();
        }
        window.addEventListener('resize', resizeCanvas);

        function renderFieldList() {
            fieldList.innerHTML = '';
            secuenciaCampos.forEach((campo, index) => {
                const li = document.createElement('li');
                li.className = 'field-item';
                if (index === currentIndex) li.classList.add('active');
                if (index < currentIndex || mappedData[campo]) li.classList.add('done');
                
                const status = (index < currentIndex || mappedData[campo]) ? '✓ Medido' : (index === currentIndex ? '▶ Actual' : 'Espera');
                
                let dataHtml = '';
                if (mappedData[campo]) {
                    const d = mappedData[campo];
                    dataHtml = `<div class="field-data">X:${d.x} Y:${d.y} | Ancho:${d.w}px Alto:${d.h}px</div>`;
                }

                li.innerHTML = `
                    <div class="field-header">
                        <span>${campo}</span> 
                        <span class="status-badge">${status}</span>
                    </div>
                    ${dataHtml}
                `;
                
                li.addEventListener('click', () => {
                    currentIndex = index;
                    renderFieldList();
                    redraw();
                });

                fieldList.appendChild(li);
            });
            const activeEl = document.querySelector('.field-item.active');
            if(activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        renderFieldList();

        // Cargar Imagen
        imageLoader.addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    resizeCanvas();
                    scale = Math.min((canvas.width - 100) / img.width, (canvas.height - 100) / img.height);
                    if (scale > 1) scale = 1; 
                    offsetX = (canvas.width - img.width * scale) / 2;
                    offsetY = (canvas.height - img.height * scale) / 2;
                    redraw();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });
        
        // Zoom con Rueda
        workspace.addEventListener('wheel', (e) => {
            e.preventDefault();
            if (!img.src) return;
            const zoomIntensity = 0.1;
            const wheel = e.deltaY < 0 ? 1 : -1;
            const zoomFactor = Math.exp(wheel * zoomIntensity);
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            offsetX = x - (x - offsetX) * zoomFactor;
            offsetY = y - (y - offsetY) * zoomFactor;
            scale *= zoomFactor;
            redraw();
        });

        // Obtener coordenada real de la imagen
        function getRealCoords(e) {
            const rect = canvas.getBoundingClientRect();
            const rawX = e.clientX - rect.left;
            const rawY = e.clientY - rect.top;
            return {
                x: Math.round((rawX - offsetX) / scale),
                y: Math.round((rawY - offsetY) / scale)
            };
        }

        // Eventos de Mouse
        workspace.addEventListener('mousedown', (e) => {
            if (!img.src) return;
            
            // Paneo de cámara (SHIFT o Clic Derecho)
            if (e.shiftKey || e.button === 2) {
                isDragging = true;
                dragStartX = e.clientX - offsetX;
                dragStartY = e.clientY - offsetY;
                workspace.style.cursor = 'grabbing';
                return;
            }

            // Dibujar Caja de Medición
            if (currentIndex >= secuenciaCampos.length) return alert("Secuencia completa. Puedes revisar clickeando la lista.");

            const realCoords = getRealCoords(e);
            
            // Solo empezar si hacemos clic dentro de la imagen
            if (realCoords.x >= 0 && realCoords.x <= img.width && realCoords.y >= 0 && realCoords.y <= img.height) {
                isDrawingBox = true;
                boxStartX = realCoords.x;
                boxStartY = realCoords.y;
                boxCurrentX = realCoords.x;
                boxCurrentY = realCoords.y;
            }
        });

        workspace.addEventListener('mousemove', (e) => {
            if (!img.src) return;
            const rect = canvas.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;

            if (isDragging) {
                offsetX = e.clientX - dragStartX;
                offsetY = e.clientY - dragStartY;
            } else if (isDrawingBox) {
                const realCoords = getRealCoords(e);
                boxCurrentX = Math.max(0, Math.min(realCoords.x, img.width)); // Limitar a los bordes
                boxCurrentY = Math.max(0, Math.min(realCoords.y, img.height));
            }
            redraw();
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            workspace.style.cursor = 'crosshair';

            if (isDrawingBox) {
                isDrawingBox = false;
                
                const w = Math.abs(boxCurrentX - boxStartX);
                const h = Math.abs(boxCurrentY - boxStartY);
                
                // Si el rectángulo es muy pequeño (clic accidental), lo ignoramos
                if (w > 5 && h > 5) {
                    const x = Math.min(boxStartX, boxCurrentX);
                    const y = Math.min(boxStartY, boxCurrentY);
                    
                    const currentField = secuenciaCampos[currentIndex];
                    mappedData[currentField] = { x, y, w, h };
                    
                    currentIndex++;
                    updateJSON();
                    renderFieldList();
                }
                redraw();
            }
        });

        // Motor de Dibujo
        function redraw() {
            if (!img.src) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // --- CAPA 1: IMAGEN Y CAJAS GUARDADAS ---
            ctx.save();
            ctx.translate(offsetX, offsetY);
            ctx.scale(scale, scale);
            ctx.drawImage(img, 0, 0);

            // Dibujar cajas ya mapeadas
            for (const [key, coords] of Object.entries(mappedData)) {
                ctx.fillStyle = 'rgba(16, 185, 129, 0.3)'; // Verde transparente
                ctx.strokeStyle = '#10b981'; // Verde solido
                ctx.lineWidth = 2 / scale;
                ctx.fillRect(coords.x, coords.y, coords.w, coords.h);
                ctx.strokeRect(coords.x, coords.y, coords.w, coords.h);

                // Etiqueta
                ctx.font = `bold ${14 / scale}px Segoe UI`;
                ctx.fillStyle = '#000';
                const tagText = `${key} (${coords.w}x${coords.h})`;
                const metrics = ctx.measureText(tagText);
                ctx.fillRect(coords.x, coords.y - (18 / scale), metrics.width + (8 / scale), 18 / scale);
                
                ctx.fillStyle = '#10b981';
                ctx.fillText(tagText, coords.x + (4 / scale), coords.y - (4 / scale));
            }

            // Dibujar caja en progreso (En vivo)
            if (isDrawingBox) {
                const rx = Math.min(boxStartX, boxCurrentX);
                const ry = Math.min(boxStartY, boxCurrentY);
                const rw = Math.abs(boxCurrentX - boxStartX);
                const rh = Math.abs(boxCurrentY - boxStartY);

                ctx.fillStyle = 'rgba(59, 130, 246, 0.4)'; // Azul transparente
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 2 / scale;
                ctx.fillRect(rx, ry, rw, rh);
                ctx.strokeRect(rx, ry, rw, rh);
            }
            
            ctx.restore();

            // --- CAPA 2: MIRA TELESCÓPICA Y DATOS EN VIVO (Fija en UI) ---
            if (mouseX >= 0 && mouseY >= 0 && !isDragging) {
                // Crosshair
                ctx.beginPath();
                ctx.moveTo(mouseX, 0); ctx.lineTo(mouseX, canvas.height);
                ctx.moveTo(0, mouseY); ctx.lineTo(canvas.width, mouseY);
                ctx.strokeStyle = 'rgba(59, 130, 246, 0.5)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.stroke();
                ctx.setLineDash([]);

                // Tooltip en vivo
                let tooltipText = "";
                if (isDrawingBox) {
                    const rw = Math.abs(boxCurrentX - boxStartX);
                    const rh = Math.abs(boxCurrentY - boxStartY);
                    tooltipText = `Ancho: ${rw}px | Alto: ${rh}px`;
                } else {
                    const rX = Math.round((mouseX - offsetX) / scale);
                    const rY = Math.round((mouseY - offsetY) / scale);
                    if (rX >= 0 && rX <= img.width && rY >= 0 && rY <= img.height) {
                        tooltipText = `X:${rX} Y:${rY} (Clic y arrastra para medir)`;
                    }
                }

                if (tooltipText) {
                    ctx.font = 'bold 12px Consolas';
                    const txtWidth = ctx.measureText(tooltipText).width;
                    ctx.fillStyle = isDrawingBox ? 'rgba(59, 130, 246, 0.9)' : 'rgba(0,0,0,0.85)';
                    ctx.fillRect(mouseX + 15, mouseY + 15, txtWidth + 10, 20);
                    ctx.fillStyle = '#fff';
                    ctx.fillText(tooltipText, mouseX + 20, mouseY + 29);
                }
            }
        }

        function updateJSON() {
            jsonOutput.value = JSON.stringify(mappedData, null, 4);
            jsonOutput.scrollTop = jsonOutput.scrollHeight;
        }

        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm('¿Reiniciar mediciones? Se borrarán todos los cuadros.')) {
                mappedData = {};
                currentIndex = 0;
                updateJSON();
                renderFieldList();
                redraw();
            }
        });

        document.getElementById('copyBtn').addEventListener('click', () => {
            if(Object.keys(mappedData).length === 0) return;
            jsonOutput.select();
            document.execCommand('copy');
            const btn = document.getElementById('copyBtn');
            btn.innerText = '¡Copiado!';
            setTimeout(() => btn.innerText = '📋 Copiar', 2000);
        });
        
        window.addEventListener('contextmenu', e => e.preventDefault());
        resizeCanvas();
    </script>
</body>
</html>
