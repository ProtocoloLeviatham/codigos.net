<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I.A.C.D.I. - Mapeador Secuencial Automático</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --accent: #3b82f6; --success: #10b981; --text: #f8fafc; --text-muted: #94a3b8; }
        body { margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }
        
        #sidebar { width: 380px; background-color: var(--panel); border-right: 1px solid #334155; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 20px 20px 10px; border-bottom: 1px solid #334155; }
        h2 { color: var(--accent); font-size: 1.2rem; margin: 0 0 10px 0; letter-spacing: 0.5px; }
        
        .controls { padding: 15px 20px; display: flex; gap: 10px; border-bottom: 1px solid #334155; }
        button, .file-upload { flex: 1; background: var(--accent); color: white; border: none; padding: 10px; font-weight: bold; cursor: pointer; border-radius: 6px; text-align: center; font-size: 0.85rem; transition: background 0.2s; }
        button:hover, .file-upload:hover { background: #2563eb; }
        button.danger { background: #ef4444; }
        button.danger:hover { background: #dc2626; }
        input[type="file"] { display: none; }

        #field-list { flex: 1; overflow-y: auto; padding: 10px 20px; list-style: none; margin: 0; }
        .field-item { padding: 10px; margin-bottom: 5px; background: #0f172a; border: 1px solid #334155; border-radius: 6px; font-size: 0.85rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; transition: all 0.2s; }
        .field-item.active { background: rgba(59, 130, 246, 0.2); border-color: var(--accent); color: white; border-left: 4px solid var(--accent); transform: translateX(5px); font-weight: bold; }
        .field-item.done { border-color: var(--success); color: var(--success); }
        
        .json-container { height: 200px; border-top: 1px solid #334155; display: flex; flex-direction: column; }
        .json-header { padding: 5px 20px; background: #0f172a; font-size: 0.8rem; color: var(--text-muted); display: flex; justify-content: space-between; align-items: center; }
        .json-header span { cursor: pointer; color: var(--accent); }
        #json-output { flex: 1; background: #000; color: var(--success); border: none; padding: 10px 20px; font-family: 'Consolas', monospace; font-size: 0.8rem; resize: none; outline: none; }

        #workspace { flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start; padding: 20px; background-image: radial-gradient(#334155 1px, transparent 1px); background-size: 20px 20px; }
        canvas { background-color: transparent; box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); cursor: crosshair; max-width: 100%; border-radius: 4px; }
        
        .status-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; background: #334155; }
        .done .status-badge { background: rgba(16, 185, 129, 0.2); }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="sidebar-header">
            <h2>Configuración de Plantilla</h2>
            <p style="margin:0; font-size: 0.8rem; color: var(--text-muted);">Sigue el orden de la lista y haz clic en la imagen.</p>
        </div>
        
        <div class="controls">
            <label class="file-upload">
                <input type="file" id="imageLoader" accept="image/*">
                📁 Cargar Imagen
            </label>
            <button id="resetBtn" class="danger">⟲ Reiniciar</button>
        </div>

        <ul id="field-list">
            </ul>
        
        <div class="json-container">
            <div class="json-header">
                <b>Salida JSON</b>
                <span id="copyBtn">📋 Copiar</span>
            </div>
            <textarea id="json-output" readonly>{}</textarea>
        </div>
    </div>

    <div id="workspace">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        // Secuencia exacta solicitada
        const secuenciaCampos = [
            "Apellido / Surname",
            "Nombre / Name",
            "Sexo / Sex",
            "Nacionalidad / Nationality",
            "Ejemplar",
            "Fecha de nacimiento / Date of birth",
            "Fecha de emisión / Date of issue",
            "Fecha de vencimiento / Date of expiry",
            "Trámite Nº / Of. ident.",
            "Número inferior (CUIL)",
            "Firma Identificado / Signature"
        ];

        const imageLoader = document.getElementById('imageLoader');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const jsonOutput = document.getElementById('json-output');
        const fieldList = document.getElementById('field-list');
        
        let img = new Image();
        let mappedData = {};
        let currentIndex = 0;

        // Inicializar UI de la lista
        function renderFieldList() {
            fieldList.innerHTML = '';
            secuenciaCampos.forEach((campo, index) => {
                const li = document.createElement('li');
                li.className = 'field-item';
                if (index === currentIndex) li.classList.add('active');
                if (index < currentIndex) li.classList.add('done');
                
                const status = index < currentIndex ? '✓' : (index === currentIndex ? 'Actual' : 'Espera');
                li.innerHTML = `<span>${campo}</span> <span class="status-badge">${status}</span>`;
                fieldList.appendChild(li);
            });
            
            // Auto-scroll al elemento activo
            const activeEl = document.querySelector('.field-item.active');
            if(activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        renderFieldList();

        // Cargar imagen
        imageLoader.addEventListener('change', function(e) {
            if(!e.target.files[0]) return;
            const reader = new FileReader();
            reader.onload = function(event) {
                img.onload = function() {
                    canvas.width = img.width;
                    canvas.height = img.height;
                    redraw();
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(e.target.files[0]);
        });

        // Registrar clic y auto-avanzar
        canvas.addEventListener('mousedown', function(e) {
            if (!img.src) {
                alert("Primero debes cargar una imagen.");
                return;
            }
            if (currentIndex >= secuenciaCampos.length) {
                alert("¡Secuencia completada! Ya puedes copiar el JSON.");
                return;
            }

            const rect = canvas.getBoundingClientRect();
            // Escala para precisión matemática respecto al tamaño real de la imagen vs visualización
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top) * scaleY);

            // Obtener el campo actual de la secuencia
            const currentField = secuenciaCampos[currentIndex];
            
            // Guardar datos
            mappedData[currentField] = { x: x, y: y };
            
            // Avanzar
            currentIndex++;
            
            updateJSON();
            renderFieldList();
            redraw();
        });

        // Dibujar imagen y marcadores (Vista Previa Mejorada)
        function redraw() {
            if (!img.src) return;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(img, 0, 0);

            for (const [key, coords] of Object.entries(mappedData)) {
                // Dibujar punto de anclaje
                ctx.beginPath();
                ctx.arc(coords.x, coords.y, 4, 0, 2 * Math.PI, false);
                ctx.fillStyle = '#3b82f6'; // Punto azul
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#fff';
                ctx.stroke();

                // Calcular ancho del texto para el fondo
                ctx.font = 'bold 16px Arial';
                const metrics = ctx.measureText(key);
                const textWidth = metrics.width;

                // Dibujar fondo oscuro semitransparente para legibilidad
                ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
                ctx.beginPath();
                ctx.roundRect(coords.x + 8, coords.y - 12, textWidth + 10, 22, 4);
                ctx.fill();

                // Dibujar texto
                ctx.fillStyle = '#10b981'; // Texto verde
                ctx.fillText(key, coords.x + 13, coords.y + 4);
            }
        }

        function updateJSON() {
            jsonOutput.value = JSON.stringify(mappedData, null, 4);
            // Auto-scroll json to bottom
            jsonOutput.scrollTop = jsonOutput.scrollHeight;
        }

        // Reiniciar
        document.getElementById('resetBtn').addEventListener('click', () => {
            if(confirm('¿Estás seguro de reiniciar todo el mapeo?')) {
                mappedData = {};
                currentIndex = 0;
                updateJSON();
                renderFieldList();
                redraw();
            }
        });

        // Copiar JSON
        document.getElementById('copyBtn').addEventListener('click', () => {
            if(Object.keys(mappedData).length === 0) return;
            jsonOutput.select();
            document.execCommand('copy');
            
            const btn = document.getElementById('copyBtn');
            btn.innerText = '¡Copiado!';
            setTimeout(() => btn.innerText = '📋 Copiar', 2000);
        });
    </script>
</body>
</html>
